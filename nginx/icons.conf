# Server-блоки для icons.createui.dev.
# Размещается в /etc/nginx/sites-available/icons.createui.dev, симлинк в sites-enabled/.
#
# Требует:
#   - /etc/nginx/conf.d/icons-cache.conf (proxy_cache_path, limit_req_zone) — см. icons-cache.conf
#   - SSL-сертификат от Let's Encrypt (certbot --nginx -d icons.createui.dev)
#   - Go-сервер на 127.0.0.1:3000 (systemd-юнит icon-server)
#   - /var/www/icons-landing/ (статика лендинга, rsync из CI)
#   - /var/icons/bundles/{version}/createui-icons.js[.map] (CDN-бандл, rsync из CI)

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name icons.createui.dev;

    # ACME challenge (certbot renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # `listen ... http2` работает на nginx 1.9.5+ (в 1.25.1+ выдаёт deprecation
    # warning в пользу `http2 on;`, но остаётся валидным). Используем старый
    # синтаксис ради совместимости с Ubuntu 24.04 (nginx 1.24).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name icons.createui.dev;

    # SSL (пути подставит certbot при установке cert)
    ssl_certificate     /etc/letsencrypt/live/icons.createui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icons.createui.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers. ВНИМАНИЕ: любой `add_header` внутри location блокирует
    # наследование этих (nginx-gotcha). Поэтому продублированы в bundle- и
    # SVG-локациях ниже. Менять только здесь + скопировать в локации.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: узкий whitelist — всё self-hosted. `frame-ancestors 'self'` заменяет
    # устаревший X-Frame-Options. `style-src 'unsafe-inline'` нужен для Astro
    # (инлайновые стили с хэшами в шаблонах).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Общий rate limit для домена
    limit_req zone=icons_rl burst=50 nodelay;

    # gzip для текстового контента (SVG хорошо жмётся: ~600B → ~400B)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    # text/html уже в gzip-дефолте nginx, не перечисляем
    gzip_types image/svg+xml application/javascript text/css application/json;

    # ─── /health — прямой проксинг на Go ─────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
    }

    # ─── CDN-бандл <script src="..."> ────────────────────────────────────────
    # URL: https://icons.createui.dev/{version}/createui-icons.js[.map]
    # Statика из /var/icons/bundles/{version}/
    # Иммутабельный кэш на год (URL содержит версию → контент фиксирован).
    location ~ "(?-i)^/(?<ver>[0-9]+\.[0-9]+\.[0-9]+)/createui-icons\.js(?<map>\.map)?$" {
        root /var/icons/bundles;
        try_files /$ver/createui-icons.js$map =404;
        # Inherited-security-headers (см. «ВНИМАНИЕ» в server-блоке)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        # Местные
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ─── SVG-иконки → proxy_cache → Go ───────────────────────────────────────
    # URL: https://icons.createui.dev/{version}/{icon}.svg?stroke={value}
    # (?-i) — явный case-sensitive флаг PCRE: имена иконок только в lower-case.
    # Без него некоторые сборки nginx с PCRE2 могут трактовать `~` как case-insensitive.
    location ~ "(?-i)^/[0-9]+\.[0-9]+\.[0-9]+/[a-z0-9-]+\.svg$" {
        proxy_cache icons;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;

        # Inherited-security-headers (см. «ВНИМАНИЕ» в server-блоке)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        # Видно в ответе для отладки: HIT / MISS / EXPIRED / UPDATING
        add_header X-Cache-Status $upstream_cache_status always;

        # Go-сервер уже выставляет Content-Type, Cache-Control: immutable, CORS.
        # Не дублируем — Nginx пробросит как есть.

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://127.0.0.1:3000;
    }

    # ─── Лендинг (статика) ───────────────────────────────────────────────────
    # Астра генерирует статические .html для каждого маршрута.
    # Без `/index.html`-fallback: бракованные URL (напр. /foo.svg с неправильным форматом)
    # должны возвращать 404, а не лендинг.
    location / {
        root /var/www/icons-landing;
        try_files $uri $uri/ $uri.html =404;
        # Кастомная 404-страница (Astro сгенерирует /404.html)
        error_page 404 /404.html;

        # Для html — не кэшировать долго (CI обновляет страницы)
        location ~ \.html$ {
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
        # Astro-ассеты с хэшем в имени — иммутабельно
        location /_astro/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }
}
