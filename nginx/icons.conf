# Server-блоки для icons.createui.dev (лендинг).
# Размещается в /etc/nginx/sites-available/icons.createui.dev, симлинк в sites-enabled/.
#
# Требует:
#   - SSL-сертификат от Let's Encrypt (certbot --nginx -d icons.createui.dev)
#   - /var/www/icons-landing/ (статика лендинга, rsync из CI)
#
# API (SVG + CDN-бандл) живёт на соседнем домене icon.createui.dev (см. icon.conf).
# limit_req_zone объявлена в icons-cache.conf — на лендинге сознательно не
# применяем: статика дёшева, rate-limit только для API-домена.

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name icons.createui.dev;

    # ACME challenge (certbot renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # `listen ... http2` работает на nginx 1.9.5+ (в 1.25.1+ выдаёт deprecation
    # warning в пользу `http2 on;`, но остаётся валидным). Используем старый
    # синтаксис ради совместимости с Ubuntu 24.04 (nginx 1.24).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name icons.createui.dev;

    # Логи отключены: лендинг обычно малотрафичный, но унифицируем политику с
    # API-доменом (14G диска, не хотим переполнения).
    access_log off;
    error_log /var/log/nginx/icons-error.log crit;

    # SSL (пути подставит certbot при установке cert)
    ssl_certificate     /etc/letsencrypt/live/icons.createui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icons.createui.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers. ВНИМАНИЕ: любой `add_header` внутри location блокирует
    # наследование этих (nginx-gotcha). Поэтому продублированы в html/_astro
    # локациях ниже. Менять только здесь + скопировать в локации.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: узкий whitelist — всё self-hosted. `frame-ancestors 'self'` заменяет
    # устаревший X-Frame-Options. `style-src 'unsafe-inline'` нужен для Astro
    # (инлайновые стили с хэшами в шаблонах). img-src разрешает SVG с API-домена —
    # лендинг демонстрирует иконки через <createui-icon>, который грузит их
    # с icon.createui.dev.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://icon.createui.dev; style-src 'self' 'unsafe-inline'; script-src 'self' https://icon.createui.dev; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # gzip для текстового контента
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    # text/html уже в gzip-дефолте nginx, не перечисляем
    gzip_types application/javascript text/css application/json image/svg+xml;

    # ─── Лендинг (статика) ───────────────────────────────────────────────────
    # Астра генерирует статические .html для каждого маршрута.
    # Без `/index.html`-fallback: бракованные URL должны возвращать 404,
    # а не лендинг.
    location / {
        root /var/www/icons-landing;
        try_files $uri $uri/ $uri.html =404;
        # Кастомная 404-страница (Astro сгенерирует /404.html)
        error_page 404 /404.html;

        # Для html — не кэшировать долго (CI обновляет страницы)
        location ~ \.html$ {
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
        # Astro-ассеты с хэшем в имени — иммутабельно
        location /_astro/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }
}
