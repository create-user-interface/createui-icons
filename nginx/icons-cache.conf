# http-level директивы для icon.createui.dev (API-домен).
# Размещается в /etc/nginx/conf.d/icons-cache.conf (включается автоматически).
#
# Требует директорию /var/cache/nginx/icons/, владелец = www-data (или nginx).
# Лендинг на icons.createui.dev этот кэш и rate-limit не использует.

# Кэш для SVG-ответов Go-сервера.
# Ключ: URL + query (например, /1.8.0/user.svg?stroke=1.5).
# levels=1:2 — распределение по поддиректориям для ускорения доступа.
# keys_zone=icons:10m — разделяемая память для метаданных (10MB ≈ 80k ключей).
# inactive=7d — удаление ключей, к которым не обращались 7 дней.
# max_size=200m — потолок дискового кэша.
# use_temp_path=off — писать сразу в финальную локацию, без лишнего rename.
proxy_cache_path /var/cache/nginx/icons
    levels=1:2
    keys_zone=icons:10m
    inactive=7d
    max_size=200m
    use_temp_path=off;

# Rate limit: 20 req/s на IP (всплески до 50 — burst).
# Достаточно для обычных браузеров (грузят иконки пачками), ограничит ботов.
limit_req_zone $binary_remote_addr zone=icons_rl:10m rate=20r/s;
