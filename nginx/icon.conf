# Server-блоки для icon.createui.dev (SVG API + CDN-бандл).
# Размещается в /etc/nginx/sites-available/icon.createui.dev, симлинк в sites-enabled/.
#
# Требует:
#   - /etc/nginx/conf.d/icons-cache.conf (proxy_cache_path, limit_req_zone) — см. icons-cache.conf
#   - SSL-сертификат от Let's Encrypt (certbot certonly --webroot -w /var/www/certbot -d icon.createui.dev)
#   - Go-сервер на 127.0.0.1:3000 (systemd-юнит icon-server)
#   - /var/icons/bundles/{version}/createui-icons.js[.map] (CDN-бандл, rsync из CI)
#
# Лендинг живёт на соседнем домене icons.createui.dev (см. icons.conf).

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name icon.createui.dev;

    # ACME challenge (certbot renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # `listen ... http2` работает на nginx 1.9.5+ (в 1.25.1+ выдаёт deprecation
    # warning в пользу `http2 on;`, но остаётся валидным). Используем старый
    # синтаксис ради совместимости с Ubuntu 24.04 (nginx 1.24).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name icon.createui.dev;

    # Логи отключены: при большой нагрузке access_log быстро съест диск (14G VDS).
    # Оставляем только критичные ошибки в error_log.
    access_log off;
    error_log /var/log/nginx/icon-error.log crit;

    # SSL (пути подставит certbot при установке cert)
    ssl_certificate     /etc/letsencrypt/live/icon.createui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icon.createui.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers. ВНИМАНИЕ: любой `add_header` внутри location блокирует
    # наследование этих (nginx-gotcha). Поэтому продублированы в bundle- и
    # SVG-локациях ниже. Менять только здесь + скопировать в локации.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: API-домен отдаёт SVG и один JS-бандл, всё self-hosted.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Общий rate limit (зона объявлена в icons-cache.conf).
    # 429 вместо дефолтного 503 — семантически верный статус для rate-limit.
    limit_req zone=icons_rl burst=500 nodelay;
    limit_req_status 429;

    # gzip для текстового контента (SVG хорошо жмётся: ~600B → ~400B)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types image/svg+xml application/javascript application/json;

    # ─── /health — прямой проксинг на Go ─────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # ─── CDN-бандл <script src="..."> ────────────────────────────────────────
    # URL: https://icon.createui.dev/{version}/createui-icons.js[.map]
    # Statика из /var/icons/bundles/{version}/
    # Иммутабельный кэш на год (URL содержит версию → контент фиксирован).
    location ~ "(?-i)^/(?<ver>[0-9]+\.[0-9]+\.[0-9]+)/createui-icons\.js(?<map>\.map)?$" {
        root /var/icons/bundles;
        try_files /$ver/createui-icons.js$map =404;
        # Inherited-security-headers (см. «ВНИМАНИЕ» в server-блоке)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
        # Местные
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ─── SVG-иконки → proxy_cache → Go ───────────────────────────────────────
    # URL: https://icon.createui.dev/{version}/{icon}.svg?stroke={value}
    # (?-i) — явный case-sensitive флаг PCRE: имена иконок только в lower-case.
    # Без него некоторые сборки nginx с PCRE2 могут трактовать `~` как case-insensitive.
    location ~ "(?-i)^/[0-9]+\.[0-9]+\.[0-9]+/[a-z0-9-]+\.svg$" {
        proxy_cache icons;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;

        # Inherited-security-headers (см. «ВНИМАНИЕ» в server-блоке)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
        # Видно в ответе для отладки: HIT / MISS / EXPIRED / UPDATING
        add_header X-Cache-Status $upstream_cache_status always;

        # Go-сервер уже выставляет Content-Type, Cache-Control: immutable, CORS.
        # Не дублируем — Nginx пробросит как есть.

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://127.0.0.1:3000;
    }

    # ─── Всё остальное — 301 на лендинг ──────────────────────────────────────
    # API-домен не отдаёт HTML. Неподходящие URL ведут на соседний лендинг,
    # чтобы пользователь, открывший icon.createui.dev в браузере, не упёрся в 404.
    location / {
        return 301 https://icons.createui.dev$request_uri;
    }
}
